<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitter Login Page</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background-color: white;
    }

    section {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90vh;
      padding: 20px;
    }

    .logo,
    .content {
      width: 50%;
    }

    .logo {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo i {
      font-size: 300px;
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
    }

    h2 {
      font-size: 64px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    h4 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .common-btn {
      width: 300px;
      padding: 12px;
      margin: 8px 0;
      border-radius: 30px;
      border: 1px solid #ccc;
      background-color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    .common-btn:hover {
      background-color: #f0f0f0;
    }

    .signIn-btn {
      background-color: black;
      color: white;
      border: none;
    }

    .signIn-btn:hover {
      background-color: #333;
    }

    .line {
      width: 300px;
      text-align: center;
      margin: 10px 0;
      color: gray;
      font-size: 14px;
    }

    .para-1 {
      width: 300px;
      font-size: 12px;
      color: gray;
      margin-top: 10px;
      line-height: 1.5;
    }

    .para-1 a {
      color: #1d9bf0;
      text-decoration: none;
    }

    .para-2 {
      margin-top: 40px;
      margin-bottom: 10px;
      font-size: 17px;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    footer a {
      text-decoration: none;
      color: gray;
      font-size: 13px;
    }

    footer a:hover {
      text-decoration: underline;
    }
 
  </style>
</head>

<body>

  <section>

    <div class="logo">
      <i class="fa-brands fa-x-twitter"></i>
    </div>

    <div class="content">

      <h2>Happening now</h2>

      <h4>Join Twitter today.</h4>

      <button class="common-btn">
        <i class="fa-brands fa-google"></i>
        Sign up with Google
      </button>

      <button class="common-btn">
        <i class="fa-brands fa-apple"></i>
        Sign up with Apple
      </button>

      <p class="line">──────── OR ────────</p>

      <button class="common-btn signIn-btn">
        Create account
      </button>

      <p class="para-1">
        By signing up, you agree to the
        <a href="#">Terms of Service</a> and
        <a href="#">Privacy Policy</a>,
        including Cookie Use.
      </p>

      <p class="para-2">Already have an account?</p>

      <button class="common-btn">Sign in</button>

    </div>

  </section>

  <footer>
    <a href="#">About</a>
    <a href="#">Help Center</a>
    <a href="#">Terms</a>
    <a href="#">Privacy</a>
    <a href="#">Cookie Policy</a>
    <a href="#">Ads info</a>
    <a href="#">Blog</a>
    <a href="#">Careers</a>
  </footer>

</body>

</html>
