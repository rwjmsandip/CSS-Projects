<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Clone</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Header */

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    .header-left,
    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .navbar {
      font-size: 11px;
      text-decoration: none;
      color: #3c4043;
    }

    .navbar:hover {
      text-decoration: underline;
    }

    .header-right i {
      font-size: 14px;
      cursor: pointer;
      color: #555;
    }

    /* Main */

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    /* Google Logo */

    .google-text {
      display: flex;
    }

    .google-text span {
      font-size: 55px;
      font-weight: bold;
    }

    .blue {
      color: #4285f4;
    }

    .red {
      color: #ea4335;
    }

    .yellow {
      color: #fbbc05;
    }

    .green {
      color: #34a853;
    }

    /* Search Box */

    .search-box {
      width: 320px;
      border: 1px solid #dcdcdc;
      border-radius: 30px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-box:hover {
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 10px;
    }

    .search-box i {
      color: gray;
      cursor: pointer;
    }

    /* Buttons */

    .buttons {
      display: flex;
      gap: 15px;
    }

    .buttons button {
      padding: 10px 18px;
      border: 1px solid #f8f9fa;
      background-color: #f8f9fa;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
    }

    .buttons button:hover {
      border: 1px solid #dadce0;
    }

    /* Languages */

    .languages {
      font-size: 9px;
    }

    .languages a {
      margin-left: 2px;
      text-decoration: none;
      color: #1a0dab;
    }

    .languages a:hover {
      text-decoration: underline;
    }

    /* Footer */

    footer {
      background-color: #f2f2f2;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    footer div {
      display: flex;
      gap: 15px;
    }

    footer a {
      text-decoration: none;
      color: #70757a;
      font-size: 8px;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- Header -->

  <header class="header">

    <div class="header-left">
      <a class="navbar" href="#">About</a>
      <a class="navbar" href="#">Store</a>
    </div>

    <div class="header-right">
      <a class="navbar" href="#">Gmail</a>
      <a class="navbar" href="#">Images</a>

      <i class="fa-solid fa-flask"></i>
      <i class="fa-solid fa-grip"></i>
      <i class="fa-solid fa-circle-user"></i>
    </div>

  </header>

  <!-- Main -->

  <main class="main">

    <!-- Google Logo -->

    <div class="google-text">
      <span class="blue">G</span>
      <span class="red">o</span>
      <span class="yellow">o</span>
      <span class="blue">g</span>
      <span class="green">l</span>
      <span class="red">e</span>
    </div>

    <!-- Search Bar -->

    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>

      <input type="text" placeholder="Search Google or type a URL" />

      <i class="fa-solid fa-microphone"></i>
      <i class="fa-solid fa-camera"></i>
    </div>

    <!-- Buttons -->

    <div class="buttons">
      <button>Google Search</button>
      <button>I'm Feeling Lucky</button>
    </div>

    <!-- Languages -->

    <p class="languages">
      Google offered in:
      <a href="#">English</a>
      <a href="#">हिन्दी</a>
      <a href="#">Español</a>
      <a href="#">मराठी</a>
    </p>

  </main>

  <!-- Footer -->

  <footer>

    <div>
      <a href="#">Advertising</a>
      <a href="#">Business</a>
      <a href="#">How Search Works</a>
    </div>

    <div>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Settings</a>
    </div>

  </footer>

</body>

</html>
